version: '3.8'

# =================================================================== #
#  Security baseline for app containers (non-root, read-only fs)       #
# =================================================================== #
x-app-security: &app-security
  user: "1000:1000"
  read_only: true
  tmpfs:
    - /tmp:uid=1000,gid=1000,mode=1777

services:

  # ================================================================ #
  #  Redis – message broker for Celery task queue                    #
  #  Security: password auth enabled; no host port exposure.         #
  # ================================================================ #
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    command: >
      redis-server --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme_redis_2024}
    volumes:
      - redis_data:/data
    networks:
      - chatbot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_2024}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ================================================================ #
  #  etcd – configuration store for Milvus                           #
  #  No host port exposure.                                          #
  # ================================================================ #
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: chatbot_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls http://0.0.0.0:2379
      --listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    networks:
      - chatbot_network
    restart: unless-stopped

  # ================================================================ #
  #  MinIO – object storage for Milvus                               #
  #  No host port exposure.                                          #
  # ================================================================ #
  minio:
    image: minio/minio:RELEASE.2024-11-17T00-39-20Z
    container_name: chatbot_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - chatbot_network
    restart: unless-stopped

  # ================================================================ #
  #  Milvus – vector database                                        #
  #  No host port exposure.                                          #
  # ================================================================ #
  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: chatbot_milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - chatbot_network
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ================================================================ #
  #  Bot Agent – handles Telegram interactions using LangGraph       #
  #  Security: non-root user, read-only fs, Redis password.          #
  # ================================================================ #
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *app-security
    container_name: chatbot_bot
    command: python -m app.bot
    depends_on:
      - redis
      - milvus
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_2024}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      BOT_LOG_LEVEL: INFO
      # Override config.ini APP paths — those point to WSL paths that don't
      # exist inside the container. Use Docker-internal paths that match
      # the volume mounts below.
      LOG_DIR: /comp7940-lab/logs
      TEMP_DIR: /comp7940-lab/temp
    volumes:
      - ./config.ini:/comp7940-lab/config.ini:ro
      - ./logs:/comp7940-lab/logs
      - ./temp:/comp7940-lab/temp
    networks:
      - chatbot_network
    restart: unless-stopped

  # ================================================================ #
  #  Video Worker – processes image-to-video tasks (10 replicas)     #
  # ================================================================ #
  video_worker:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *app-security
    command: python -m workers.entry
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_2024}
      WORKER_TYPE: video
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      LOG_DIR: /comp7940-lab/logs
      TEMP_DIR: /comp7940-lab/temp
    volumes:
      - ./config.ini:/comp7940-lab/config.ini:ro
      - ./logs:/comp7940-lab/logs
      - ./temp:/comp7940-lab/temp
    networks:
      - chatbot_network
    restart: unless-stopped
    deploy:
      replicas: 10
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ================================================================ #
  #  OCR Worker – processes document analysis tasks (20 replicas)    #
  # ================================================================ #
  ocr_worker:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *app-security
    command: python -m workers.entry
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_2024}
      WORKER_TYPE: ocr
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      LOG_DIR: /comp7940-lab/logs
      TEMP_DIR: /comp7940-lab/temp
    volumes:
      - ./config.ini:/comp7940-lab/config.ini:ro
      - ./logs:/comp7940-lab/logs
      - ./temp:/comp7940-lab/temp
    networks:
      - chatbot_network
    restart: unless-stopped
    deploy:
      replicas: 20
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ================================================================ #
  #  API – FastAPI admin interface for course data management        #
  #  Security: non-root, read-only fs, HTTPS, Token auth + audit.   #
  #  Port 8000 is the only service exposed to the host.             #
  # ================================================================ #
  api:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *app-security
    container_name: chatbot_api
    command: >
      uvicorn app.api:app --host 0.0.0.0 --port 8000
      --ssl-certfile /etc/ssl/certs/cert.pem
      --ssl-keyfile /etc/ssl/private/key.pem
    depends_on:
      - milvus
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      # Admin tokens — JSON object mapping token → role
      # Roles: "upload" (can upload + view) | "view" (view-only)
      # YAML: JSON string must be quoted with single quotes!
      # Generate tokens: python3 -c "import secrets; print(secrets.token_hex(32))"
      ADMIN_TOKENS_JSON: '{"ddd53ef28d8a732a95e0390f770fb926b48bf44722efa9ebf86dfed5b7d4818a":"upload","b7731d95f3e7507fcd735b1d1cd35d4d3ecdac9c8e2ebb1fc7d3a6178ba662c2":"upload","5d07bc36f2a149fa553fbf11e783a9b4a3e6f3df7164205d3fa145d046b22568":"upload","682452777f4aa7cf40cc4f8541ccb15d1d6c425f2dd9bb338b4ad7b003594861":"view","a7d969f126dfad0c726cdfd35301192ce21ea8e77e6264844e6114ac081cfdb7":"view"}'
    ports:
      - "8000:8000"
    volumes:
      - ./config.ini:/comp7940-lab/config.ini:ro
      - ./logs:/comp7940-lab/logs
    networks:
      - chatbot_network
    restart: unless-stopped

networks:
  chatbot_network:
    driver: bridge

volumes:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
